<h1>Figure 3 &mdash; Why No Counter</h1>
<p class="subtitle">Software drives the recursion countdown in data registers. Hardware follows with a 1-bit flag and a PC register. The hardware does not need a counter because the software already has one. The separation is clean: software counts, hardware re-enters.</p>

<svg viewBox="0 0 1100 780" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="ah-b" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2a6db5"/>
    </marker>
    <marker id="ah-g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27864a"/>
    </marker>
    <marker id="ah-r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cc3333"/>
    </marker>
  </defs>

  <style>
    .label { font-family:'Segoe UI',system-ui,sans-serif; font-size:12px; fill:#333; text-anchor:start; dominant-baseline:central; }
    .label-c { font-family:'Segoe UI',system-ui,sans-serif; font-size:12px; fill:#333; text-anchor:middle; dominant-baseline:central; }
    .title { font-family:'Segoe UI',system-ui,sans-serif; font-size:14px; font-weight:700; text-anchor:middle; }
    .code { font-family:'Consolas',monospace; font-size:12px; text-anchor:start; dominant-baseline:central; }
    .step { font-family:'Consolas',monospace; font-size:13px; font-weight:700; text-anchor:start; dominant-baseline:central; }
    .note { font-family:'Segoe UI',system-ui,sans-serif; font-size:10px; fill:#555; text-anchor:start; dominant-baseline:central; }
  </style>

  <rect x="50" y="20" width="460" height="530" rx="12" fill="#f0f5fa" stroke="#2a6db5" stroke-width="2"/>
  <text class="title" x="280" y="50" fill="#2a6db5">SOFTWARE (data registers)</text>
  <text class="label-c" x="280" y="70" fill="#555">The software counts down</text>

  <text class="step" x="80" y="110" fill="#2a6db5">n=5 &#8594; LAMBDA CR6</text>
  <rect x="320" y="98" width="170" height="22" rx="4" fill="#e0ecf8" stroke="#2a6db5" stroke-width="1"/>
  <text class="code" x="330" y="110" fill="#2a6db5" font-size="10">re-enter method body</text>

  <line x1="280" y1="125" x2="280" y2="145" stroke="#2a6db5" stroke-width="1.5" marker-end="url(#ah-b)"/>

  <text class="step" x="80" y="160" fill="#2a6db5">n=4 &#8594; LAMBDA CR6</text>
  <rect x="320" y="148" width="170" height="22" rx="4" fill="#e0ecf8" stroke="#2a6db5" stroke-width="1"/>
  <text class="code" x="330" y="160" fill="#2a6db5" font-size="10">re-enter method body</text>

  <line x1="280" y1="175" x2="280" y2="195" stroke="#2a6db5" stroke-width="1.5" marker-end="url(#ah-b)"/>

  <text class="step" x="80" y="210" fill="#2a6db5">n=3 &#8594; LAMBDA CR6</text>
  <rect x="320" y="198" width="170" height="22" rx="4" fill="#e0ecf8" stroke="#2a6db5" stroke-width="1"/>
  <text class="code" x="330" y="210" fill="#2a6db5" font-size="10">re-enter method body</text>

  <line x1="280" y1="225" x2="280" y2="245" stroke="#2a6db5" stroke-width="1.5" marker-end="url(#ah-b)"/>

  <text class="step" x="80" y="260" fill="#2a6db5">n=2 &#8594; LAMBDA CR6</text>
  <rect x="320" y="248" width="170" height="22" rx="4" fill="#e0ecf8" stroke="#2a6db5" stroke-width="1"/>
  <text class="code" x="330" y="260" fill="#2a6db5" font-size="10">re-enter method body</text>

  <line x1="280" y1="275" x2="280" y2="295" stroke="#2a6db5" stroke-width="1.5" marker-end="url(#ah-b)"/>

  <text class="step" x="80" y="310" fill="#2a6db5">n=1 &#8594; LAMBDA CR6</text>
  <rect x="320" y="298" width="170" height="22" rx="4" fill="#e0ecf8" stroke="#2a6db5" stroke-width="1"/>
  <text class="code" x="330" y="310" fill="#2a6db5" font-size="10">re-enter method body</text>

  <line x1="280" y1="325" x2="280" y2="355" stroke="#cc3333" stroke-width="2" marker-end="url(#ah-r)"/>

  <rect x="70" y="360" width="420" height="45" rx="8" fill="#fce8e8" stroke="#cc3333" stroke-width="2"/>
  <text class="step" x="90" y="377" fill="#cc3333">n=0 &#8594; RETURN (base case)</text>
  <text class="note" x="90" y="395" fill="#cc3333">Software recognizes n=0, executes RETURN</text>

  <line x1="280" y1="405" x2="280" y2="435" stroke="#8855aa" stroke-width="2"/>

  <rect x="70" y="440" width="420" height="35" rx="8" fill="#f0e8f5" stroke="#8855aa" stroke-width="1.5"/>
  <text class="step" x="90" y="458" fill="#8855aa">RETURN (real &mdash; pops CALL frame)</text>

  <line x1="280" y1="475" x2="280" y2="505" stroke="#27864a" stroke-width="2" marker-end="url(#ah-g)"/>

  <rect x="140" y="510" width="280" height="30" rx="6" fill="#e8f5e8" stroke="#27864a" stroke-width="2"/>
  <text class="label-c" x="280" y="525" fill="#27864a" font-weight="bold">Done. Software counted.</text>

  <rect x="590" y="20" width="460" height="530" rx="12" fill="#f0e8f5" stroke="#8855aa" stroke-width="2"/>
  <text class="title" x="820" y="50" fill="#8855aa">HARDWARE (machine status)</text>
  <text class="label-c" x="820" y="70" fill="#555">The hardware holds 2 values</text>

  <rect x="630" y="100" width="380" height="90" rx="8" fill="#f8f0fc" stroke="#8855aa" stroke-width="1.5"/>
  <text class="code" x="660" y="125" fill="#8855aa" font-size="13">lambda_active = 1</text>
  <text class="code" x="660" y="150" fill="#8855aa" font-size="13">lambda_pc = addr+4</text>
  <text class="note" x="660" y="175" fill="#555">(same value each time &mdash; idempotent)</text>

  <rect x="680" y="220" width="280" height="100" rx="8" fill="#f5f5f0" stroke="#b8860b" stroke-width="1.5"/>
  <text class="title" x="820" y="250" fill="#b8860b" font-size="13">No counter.</text>
  <text class="label-c" x="820" y="275" fill="#333">Hardware doesn't track n.</text>
  <text class="label-c" x="820" y="295" fill="#555" font-size="11">It doesn't need to.</text>

  <line x1="280" y1="380" x2="590" y2="360" stroke="#cc3333" stroke-width="2" stroke-dasharray="6" marker-end="url(#ah-r)"/>
  <text class="note" x="380" y="345" fill="#cc3333" font-size="11" font-weight="bold">base case triggers</text>

  <rect x="630" y="360" width="380" height="45" rx="8" fill="#fce8e8" stroke="#cc3333" stroke-width="2"/>
  <text class="code" x="660" y="377" fill="#cc3333" font-size="13">Clear flag, jump to lambda_pc</text>
  <text class="note" x="660" y="395" fill="#cc3333">lambda_active &#8592; 0</text>

  <line x1="280" y1="457" x2="590" y2="440" stroke="#8855aa" stroke-width="2" stroke-dasharray="6"/>

  <rect x="630" y="440" width="380" height="35" rx="8" fill="#f0e8f5" stroke="#8855aa" stroke-width="1.5"/>
  <text class="code" x="660" y="458" fill="#8855aa" font-size="13">Pop CALL frame.</text>

  <line x1="820" y1="475" x2="820" y2="505" stroke="#27864a" stroke-width="2" marker-end="url(#ah-g)"/>

  <rect x="680" y="510" width="280" height="30" rx="6" fill="#e8f5e8" stroke="#27864a" stroke-width="2"/>
  <text class="label-c" x="820" y="525" fill="#27864a" font-weight="bold">Done. Hardware followed.</text>

  <rect x="50" y="580" width="1000" height="180" rx="12" fill="#f5f5f0" stroke="#b8860b" stroke-width="2"/>
  <text class="title" x="550" y="610" fill="#b8860b">KEY INSIGHT: SEPARATION OF CONCERNS</text>

  <text class="label" x="80" y="645" fill="#2a6db5" font-weight="bold" font-size="13">Software counts.</text>
  <text class="label" x="260" y="645" fill="#333" font-size="12">The recursion argument (n) lives in data registers. Software decrements it.</text>

  <text class="label" x="80" y="675" fill="#8855aa" font-weight="bold" font-size="13">Hardware doesn't need to.</text>
  <text class="label" x="330" y="675" fill="#333" font-size="12">A 1-bit flag and a PC register are the entire hardware cost.</text>

  <text class="label" x="80" y="705" fill="#27864a" font-weight="bold" font-size="13">Adding a hardware counter would be redundant.</text>
  <text class="label" x="490" y="705" fill="#333" font-size="12">The software already has the count.</text>

  <text class="label" x="80" y="735" fill="#cc3333" font-weight="bold" font-size="12">Principle: never duplicate in hardware what software already provides for free.</text>

</svg>
