<h1>Figure 4 &mdash; Self-Describing Stack Frames</h1>
<p class="subtitle">Capability stack with interleaved CALL frames (tag=0) and LAMBDA frames (tag=1), and RETURN restoration logic</p>

<svg viewBox="0 0 960 1020" width="960" height="1020" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5dade2"/>
    </marker>
    <marker id="ah-y" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2ecc71"/>
    </marker>
    <marker id="ah-n" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
    <marker id="ah-p" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c39bd3"/>
    </marker>
  </defs>

  <style>
    .lb { font-family:'Segoe UI',system-ui,sans-serif; font-size:13px; fill:#e8e8e8; text-anchor:middle; dominant-baseline:central; }
    .ls { font-family:'Segoe UI',system-ui,sans-serif; font-size:11px; fill:#a0b0c0; text-anchor:middle; dominant-baseline:central; }
    .lt { font-family:'Segoe UI',system-ui,sans-serif; font-size:11px; fill:#a0b0c0; text-anchor:start; dominant-baseline:central; }
    .lr { font-family:'Segoe UI',system-ui,sans-serif; font-size:11px; fill:#a0b0c0; text-anchor:end; dominant-baseline:central; }
    .lb-b { font-weight:700; }
    .ph { font-family:'Segoe UI',system-ui,sans-serif; font-size:15px; font-weight:700; }
    .br { font-family:'Segoe UI',system-ui,sans-serif; font-size:12px; font-weight:700; }
    .cy { font-family:'Segoe UI',system-ui,sans-serif; font-size:10px; fill:#f5c842; text-anchor:middle; }
    .mono { font-family:'Consolas','Courier New',monospace; font-size:12px; }
  </style>

  <!-- ========== LEFT SIDE: THE CAPABILITY STACK ========== -->

  <text class="ph" x="200" y="30" text-anchor="middle" fill="#f5c842">CAPABILITY STACK</text>
  <text class="ls" x="200" y="48" fill="#8899aa">grows downward &#x25BC;</text>

  <!-- Stack pointer indicator -->
  <text class="lt mono" x="28" y="77" fill="#5dade2">SP &#x25B6;</text>

  <!-- ===== CALL Frame 1 (tag=0) — outermost ===== -->
  <rect x="70" y="65" width="260" height="26" rx="0" fill="#1a2a3a" stroke="#5dade2" stroke-width="1.5"/>
  <rect x="70" y="65" width="50" height="26" rx="0" fill="#0f3a5a" stroke="#5dade2" stroke-width="1.5"/>
  <text class="mono lb-b" x="95" y="78" fill="#5dade2" font-size="11">Tag=0</text>
  <text class="mono" x="210" y="78" fill="#c8d6e5" font-size="11">CR5 (Services C-List)</text>

  <rect x="70" y="91" width="260" height="26" rx="0" fill="#1a2a3a" stroke="#5dade2" stroke-width="1"/>
  <text class="mono" x="200" y="104" fill="#c8d6e5" font-size="11">CR6 (Active C-List)</text>

  <rect x="70" y="117" width="260" height="26" rx="0" fill="#1a2a3a" stroke="#5dade2" stroke-width="1"/>
  <text class="mono" x="200" y="130" fill="#c8d6e5" font-size="11">CR7 (Active Nucleus)</text>

  <rect x="70" y="143" width="260" height="26" rx="0" fill="#1a2a3a" stroke="#5dade2" stroke-width="1"/>
  <text class="mono" x="200" y="156" fill="#c8d6e5" font-size="11">PC return address</text>

  <rect x="70" y="169" width="260" height="26" rx="0" fill="#1a2a3a" stroke="#5dade2" stroke-width="1"/>
  <text class="mono" x="200" y="182" fill="#c8d6e5" font-size="11">LAMBDA_PC | LAMBDA-active</text>

  <!-- Label -->
  <text class="lr" x="65" y="130" fill="#5dade2" font-size="11">CALL</text>
  <text class="lr" x="65" y="144" fill="#5dade2" font-size="11">frame</text>

  <!-- Brace right -->
  <line x1="335" y1="68" x2="345" y2="68" stroke="#5dade2" stroke-width="1"/>
  <line x1="345" y1="68" x2="345" y2="192" stroke="#5dade2" stroke-width="1"/>
  <line x1="335" y1="192" x2="345" y2="192" stroke="#5dade2" stroke-width="1"/>
  <text class="lt" x="352" y="105" fill="#5dade2" font-size="10">Full domain</text>
  <text class="lt" x="352" y="118" fill="#5dade2" font-size="10">context</text>
  <text class="lt" x="352" y="134" fill="#5dade2" font-size="10">5 words</text>

  <!-- Gap spacer -->
  <rect x="70" y="199" width="260" height="8" rx="0" fill="#0a0e17" stroke="none"/>

  <!-- ===== LAMBDA Frame (tag=1) — pushed when CALL saved LAMBDA state ===== -->
  <rect x="70" y="207" width="260" height="26" rx="0" fill="#2a1a2a" stroke="#c39bd3" stroke-width="1.5"/>
  <rect x="70" y="207" width="50" height="26" rx="0" fill="#3a1a3a" stroke="#c39bd3" stroke-width="1.5"/>
  <text class="mono lb-b" x="95" y="220" fill="#c39bd3" font-size="11">Tag=1</text>
  <text class="mono" x="210" y="220" fill="#c8d6e5" font-size="11">PC only (LAMBDA return)</text>

  <!-- Label -->
  <text class="lr" x="65" y="220" fill="#c39bd3" font-size="11">LAMBDA</text>

  <!-- Brace right -->
  <line x1="335" y1="210" x2="345" y2="210" stroke="#c39bd3" stroke-width="1"/>
  <line x1="345" y1="210" x2="345" y2="230" stroke="#c39bd3" stroke-width="1"/>
  <line x1="335" y1="230" x2="345" y2="230" stroke="#c39bd3" stroke-width="1"/>
  <text class="lt" x="352" y="220" fill="#c39bd3" font-size="10">Minimal: 1 word. Restore PC only.</text>

  <!-- Gap spacer -->
  <rect x="70" y="237" width="260" height="8" rx="0" fill="#0a0e17" stroke="none"/>

  <!-- ===== CALL Frame 2 (tag=0) — middle ===== -->
  <rect x="70" y="245" width="260" height="26" rx="0" fill="#1a2a3a" stroke="#5dade2" stroke-width="1.5"/>
  <rect x="70" y="245" width="50" height="26" rx="0" fill="#0f3a5a" stroke="#5dade2" stroke-width="1.5"/>
  <text class="mono lb-b" x="95" y="258" fill="#5dade2" font-size="11">Tag=0</text>
  <text class="mono" x="210" y="258" fill="#c8d6e5" font-size="11">CR5 (Services C-List)</text>

  <rect x="70" y="271" width="260" height="26" rx="0" fill="#1a2a3a" stroke="#5dade2" stroke-width="1"/>
  <text class="mono" x="200" y="284" fill="#c8d6e5" font-size="11">CR6 (Active C-List)</text>

  <rect x="70" y="297" width="260" height="26" rx="0" fill="#1a2a3a" stroke="#5dade2" stroke-width="1"/>
  <text class="mono" x="200" y="310" fill="#c8d6e5" font-size="11">CR7 (Active Nucleus)</text>

  <rect x="70" y="323" width="260" height="26" rx="0" fill="#1a2a3a" stroke="#5dade2" stroke-width="1"/>
  <text class="mono" x="200" y="336" fill="#c8d6e5" font-size="11">PC return address</text>

  <rect x="70" y="349" width="260" height="26" rx="0" fill="#1a2a3a" stroke="#5dade2" stroke-width="1"/>
  <text class="mono" x="200" y="362" fill="#c8d6e5" font-size="11">LAMBDA_PC | LAMBDA-active</text>

  <!-- Label -->
  <text class="lr" x="65" y="310" fill="#5dade2" font-size="11">CALL</text>
  <text class="lr" x="65" y="324" fill="#5dade2" font-size="11">frame</text>

  <!-- Gap spacer -->
  <rect x="70" y="379" width="260" height="8" rx="0" fill="#0a0e17" stroke="none"/>

  <!-- ===== CALL Frame 3 (tag=0) — innermost/oldest ===== -->
  <rect x="70" y="387" width="260" height="26" rx="0" fill="#1a2a3a" stroke="#5dade2" stroke-width="1.5"/>
  <rect x="70" y="387" width="50" height="26" rx="0" fill="#0f3a5a" stroke="#5dade2" stroke-width="1.5"/>
  <text class="mono lb-b" x="95" y="400" fill="#5dade2" font-size="11">Tag=0</text>
  <text class="mono" x="210" y="400" fill="#c8d6e5" font-size="11">CR5 (Services C-List)</text>

  <rect x="70" y="413" width="260" height="26" rx="0" fill="#1a2a3a" stroke="#5dade2" stroke-width="1"/>
  <text class="mono" x="200" y="426" fill="#c8d6e5" font-size="11">CR6 (Active C-List)</text>

  <rect x="70" y="439" width="260" height="26" rx="0" fill="#1a2a3a" stroke="#5dade2" stroke-width="1"/>
  <text class="mono" x="200" y="452" fill="#c8d6e5" font-size="11">CR7 (Active Nucleus)</text>

  <rect x="70" y="465" width="260" height="26" rx="0" fill="#1a2a3a" stroke="#5dade2" stroke-width="1"/>
  <text class="mono" x="200" y="478" fill="#c8d6e5" font-size="11">PC return address</text>

  <rect x="70" y="491" width="260" height="26" rx="0" fill="#1a2a3a" stroke="#5dade2" stroke-width="1"/>
  <text class="mono" x="200" y="504" fill="#c8d6e5" font-size="11">LAMBDA_PC | LAMBDA-active</text>

  <!-- Label -->
  <text class="lr" x="65" y="452" fill="#5dade2" font-size="11">CALL</text>
  <text class="lr" x="65" y="466" fill="#5dade2" font-size="11">frame</text>

  <!-- Stack bottom -->
  <rect x="70" y="521" width="260" height="20" rx="0" fill="#0a0e17" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>
  <text class="ls" x="200" y="531" fill="#555">stack bottom</text>

  <!-- Size comparison annotation -->
  <rect x="70" y="558" width="260" height="50" rx="8" fill="#0f1520" stroke="#3a4a5a" stroke-width="1" stroke-dasharray="3,3"/>
  <text class="ls" x="200" y="574" fill="#8899aa">CALL frame: 5 words (CR5 + CR6 + CR7 + PC + LAMBDA state)</text>
  <text class="ls" x="200" y="592" fill="#8899aa">LAMBDA frame: 1 word (PC only)</text>

  <!-- ========== EXECUTION TRACE (center annotation) ========== -->

  <text class="ph" x="200" y="640" text-anchor="middle" fill="#f5c842">EXECUTION TRACE</text>
  <text class="ls" x="200" y="658" fill="#8899aa">How this stack was built:</text>

  <rect x="50" y="672" width="360" height="170" rx="8" fill="#0f1520" stroke="#3a4a5a" stroke-width="1"/>

  <text class="lt mono" x="65" y="694" fill="#6aaa6a" font-size="11">1. CALL CR6          ; push CALL frame (tag=0)</text>
  <text class="lt mono" x="65" y="714" fill="#6aaa6a" font-size="11">2.   CALL CR6        ; push CALL frame (tag=0)</text>
  <text class="lt mono" x="65" y="734" fill="#6aaa6a" font-size="11">3.     LAMBDA CR2, x ; set LAMBDA-active flag</text>
  <text class="lt mono" x="65" y="748" fill="#555" font-size="10">                        (no stack push — machine status)</text>
  <text class="lt mono" x="65" y="768" fill="#6aaa6a" font-size="11">4.       CALL CR6    ; save LAMBDA state, push CALL</text>
  <text class="lt mono" x="65" y="782" fill="#555" font-size="10">                        frame (tag=0) + clears LAMBDA-active</text>
  <text class="lt mono" x="65" y="802" fill="#6aaa6a" font-size="11">5.         LAMBDA CR3, y  ; new LAMBDA in called domain</text>
  <text class="lt mono" x="65" y="816" fill="#555" font-size="10">                            (no stack push — machine status)</text>
  <text class="lt mono" x="65" y="832" fill="#aaa" font-size="11">           &#x25C0; SP is here. Stack has 3 CALL + 1 LAMBDA</text>

  <!-- ========== RIGHT SIDE: RETURN DECISION LOGIC ========== -->

  <text class="ph" x="700" y="30" text-anchor="middle" fill="#f5c842">RETURN LOGIC</text>
  <text class="ls" x="700" y="48" fill="#8899aa">How RETURN inspects the tag</text>

  <!-- RETURN instruction -->
  <rect x="625" y="65" width="150" height="36" rx="8" fill="#0f2640" stroke="#5dade2" stroke-width="2"/>
  <text class="lb lb-b" x="700" y="83">RETURN</text>

  <!-- Arrow down -->
  <line x1="700" y1="101" x2="700" y2="125" stroke="#5dade2" stroke-width="2" marker-end="url(#ah)"/>

  <!-- Decision: LAMBDA-active in machine status? -->
  <polygon points="700,130 800,168 700,206 600,168" fill="#2a1a0f" stroke="#f39c12" stroke-width="2"/>
  <text class="lb" x="700" y="163">LAMBDA-active</text>
  <text class="lb" x="700" y="178">in status?</text>

  <!-- YES → Fast path (no stack) -->
  <line x1="600" y1="168" x2="490" y2="168" stroke="#2ecc71" stroke-width="2" marker-end="url(#ah-y)"/>
  <text class="br" x="545" y="160" fill="#2ecc71">Yes</text>

  <rect x="432" y="148" width="62" height="40" rx="6" fill="#0f3a1a" stroke="#2ecc71" stroke-width="1.5"/>
  <text class="ls" x="463" y="162" fill="#2ecc71">Fast</text>
  <text class="ls" x="463" y="176" fill="#2ecc71">path</text>

  <!-- Fast path details -->
  <line x1="463" y1="188" x2="463" y2="210" stroke="#2ecc71" stroke-width="1.5" marker-end="url(#ah-y)"/>
  <rect x="420" y="215" width="86" height="55" rx="6" fill="#0f2620" stroke="#2ecc71" stroke-width="1"/>
  <text class="ls" x="463" y="230" fill="#c8d6e5">Restore PC</text>
  <text class="ls" x="463" y="244" fill="#c8d6e5">from status</text>
  <text class="ls" x="463" y="258" fill="#c8d6e5">Clear flag</text>
  <text class="cy" x="463" y="280">~1 cycle</text>
  <text class="ls" x="463" y="296" fill="#2ecc71">Zero stack</text>

  <!-- NO → Pop stack frame -->
  <line x1="700" y1="206" x2="700" y2="240" stroke="#e74c3c" stroke-width="2" marker-end="url(#ah-n)"/>
  <text class="br" x="715" y="228" fill="#e74c3c">No</text>

  <!-- Pop frame -->
  <rect x="625" y="245" width="150" height="36" rx="8" fill="#1a1a2a" stroke="#8899aa" stroke-width="1.5"/>
  <text class="lb" x="700" y="263">Pop stack frame</text>

  <!-- Arrow down -->
  <line x1="700" y1="281" x2="700" y2="310" stroke="#5dade2" stroke-width="2" marker-end="url(#ah)"/>

  <!-- Decision: Inspect tag bit -->
  <polygon points="700,315 795,353 700,391 605,353" fill="#2a1a0f" stroke="#f39c12" stroke-width="2"/>
  <text class="lb" x="700" y="348">Inspect</text>
  <text class="lb" x="700" y="364">tag bit</text>

  <!-- TAG = 0 → CALL frame restoration (left) -->
  <line x1="605" y1="353" x2="505" y2="353" stroke="#5dade2" stroke-width="2" marker-end="url(#ah)"/>
  <text class="br" x="555" y="345" fill="#5dade2">Tag = 0</text>

  <rect x="432" y="325" width="78" height="56" rx="6" fill="#1a2a3a" stroke="#5dade2" stroke-width="1.5"/>
  <text class="ls" x="471" y="340" fill="#5dade2">CALL</text>
  <text class="ls" x="471" y="355" fill="#5dade2">frame</text>
  <text class="ls" x="471" y="370" fill="#5dade2">restore</text>

  <!-- CALL restore details -->
  <line x1="471" y1="381" x2="471" y2="400" stroke="#5dade2" stroke-width="1.5" marker-end="url(#ah)"/>

  <rect x="420" y="405" width="102" height="110" rx="6" fill="#0f2640" stroke="#5dade2" stroke-width="1"/>
  <text class="ls" x="471" y="420" fill="#c8d6e5">1. Check E on</text>
  <text class="ls" x="471" y="434" fill="#c8d6e5">   saved CR6 GT</text>
  <text class="ls" x="471" y="452" fill="#c8d6e5">2. Restore CR5</text>
  <text class="ls" x="471" y="466" fill="#c8d6e5">3. Restore CR6</text>
  <text class="ls" x="471" y="480" fill="#c8d6e5">4. Restore CR7</text>
  <text class="ls" x="471" y="494" fill="#c8d6e5">   (all via mLoad)</text>
  <text class="ls" x="471" y="508" fill="#c8d6e5">5. Restore PC</text>

  <text class="cy" x="471" y="530">5+ cycles</text>
  <text class="ls" x="471" y="546" fill="#5dade2">Full domain</text>
  <text class="ls" x="471" y="560" fill="#5dade2">restoration</text>

  <!-- mLoad annotation -->
  <rect x="420" y="568" width="102" height="42" rx="4" fill="#0a0e17" stroke="#3a5a3a" stroke-width="1" stroke-dasharray="3,3"/>
  <text class="ls" x="471" y="582" fill="#6aaa6a">Each CR goes</text>
  <text class="ls" x="471" y="596" fill="#6aaa6a">through mLoad</text>

  <!-- TAG = 1 → LAMBDA frame restoration (right) -->
  <line x1="795" y1="353" x2="870" y2="353" stroke="#c39bd3" stroke-width="2" marker-end="url(#ah-p)"/>
  <text class="br" x="833" y="345" fill="#c39bd3">Tag = 1</text>

  <rect x="865" y="325" width="78" height="56" rx="6" fill="#2a1a2a" stroke="#c39bd3" stroke-width="1.5"/>
  <text class="ls" x="904" y="340" fill="#c39bd3">LAMBDA</text>
  <text class="ls" x="904" y="355" fill="#c39bd3">frame</text>
  <text class="ls" x="904" y="370" fill="#c39bd3">restore</text>

  <!-- LAMBDA restore details -->
  <line x1="904" y1="381" x2="904" y2="400" stroke="#c39bd3" stroke-width="1.5" marker-end="url(#ah-p)"/>

  <rect x="855" y="405" width="98" height="60" rx="6" fill="#2a1a2a" stroke="#c39bd3" stroke-width="1"/>
  <text class="ls" x="904" y="424" fill="#c8d6e5">1. Restore PC</text>
  <text class="ls" x="904" y="442" fill="#c8d6e5">2. Re-set</text>
  <text class="ls" x="904" y="456" fill="#c8d6e5">   LAMBDA-active</text>

  <text class="cy" x="904" y="480">~2 cycles</text>
  <text class="ls" x="904" y="496" fill="#c39bd3">PC only</text>
  <text class="ls" x="904" y="510" fill="#c39bd3">No mLoad</text>

  <!-- ========== KEY INSIGHT BOX ========== -->

  <rect x="490" y="640" width="430" height="210" rx="10" fill="#0f1520" stroke="#f5c842" stroke-width="1.5"/>
  <text class="ph" x="705" y="664" text-anchor="middle" fill="#f5c842">KEY INSIGHT</text>

  <text class="lt" x="510" y="692" fill="#c8d6e5" font-size="12">The 1-bit tag makes the stack self-describing:</text>

  <text class="lt" x="510" y="718" fill="#5dade2" font-size="12">Tag = 0 (CALL):</text>
  <text class="lt" x="530" y="736" fill="#a0b0c0" font-size="11">Frame holds CR5 + CR6 + CR7 + PC + LAMBDA state</text>
  <text class="lt" x="530" y="752" fill="#a0b0c0" font-size="11">RETURN restores full domain via mLoad (5+ cycles)</text>

  <text class="lt" x="510" y="778" fill="#c39bd3" font-size="12">Tag = 1 (LAMBDA):</text>
  <text class="lt" x="530" y="796" fill="#a0b0c0" font-size="11">Frame holds PC only (1 word)</text>
  <text class="lt" x="530" y="812" fill="#a0b0c0" font-size="11">RETURN restores PC, no mLoad (~2 cycles)</text>

  <text class="lt" x="510" y="838" fill="#6aaa6a" font-size="11">LAMBDA frames appear on stack only when CALL</text>
  <text class="lt" x="510" y="852" fill="#6aaa6a" font-size="11">intervened during a LAMBDA body. In the common</text>
  <text class="lt" x="510" y="866" fill="#6aaa6a" font-size="11">case (no CALL), no frame is pushed at all.</text>

  <!-- ========== VISUAL SIZE COMPARISON ========== -->

  <text class="ph" x="200" y="880" text-anchor="middle" fill="#f5c842">SIZE COMPARISON</text>

  <!-- CALL frame bar -->
  <rect x="70" y="900" width="250" height="28" rx="4" fill="#1a2a3a" stroke="#5dade2" stroke-width="1.5"/>
  <text class="lb" x="195" y="914" fill="#5dade2">CALL frame: 5 words</text>

  <!-- LAMBDA frame bar -->
  <rect x="70" y="938" width="50" height="28" rx="4" fill="#2a1a2a" stroke="#c39bd3" stroke-width="1.5"/>
  <text class="lb" x="95" y="952" fill="#c39bd3">1</text>
  <text class="lt" x="130" y="952" fill="#c39bd3">LAMBDA frame: 1 word (5x smaller)</text>

  <!-- Ratio label -->
  <text class="ls" x="200" y="986" fill="#8899aa">LAMBDA frames are 80% smaller than CALL frames</text>
  <text class="ls" x="200" y="1002" fill="#8899aa">In common case (fast path): 100% smaller — no frame at all</text>

</svg>
