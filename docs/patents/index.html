<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTMM Patent Portfolio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e17;
            color: #c8d6e5;
            min-height: 100vh;
            padding: 20px 16px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            font-size: 1.6rem;
            color: #e2e8f0;
            text-align: center;
            margin-bottom: 4px;
        }
        .subtitle {
            font-size: 0.85rem;
            color: #8892a4;
            text-align: center;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        .back-link {
            display: inline-block;
            color: #5dade2;
            text-decoration: none;
            font-size: 0.85rem;
            margin-bottom: 16px;
        }
        .back-link:hover { text-decoration: underline; }
        h2 {
            font-size: 1.15rem;
            color: #e2e8f0;
            margin: 24px 0 12px 0;
            padding-bottom: 6px;
            border-bottom: 1px solid #1e2a3a;
        }
        .section-note {
            font-size: 0.8rem;
            color: #8892a4;
            margin-bottom: 12px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }
        .figures-grid {
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        }
        .card {
            background: #141a28;
            border: 1px solid #1e2a3a;
            border-radius: 8px;
            padding: 14px 16px;
            text-decoration: none;
            color: inherit;
            transition: border-color 0.25s, transform 0.15s, box-shadow 0.25s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .card:hover {
            border-color: #5dade2;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(93,173,226,0.1);
        }
        .card-icon {
            font-size: 1.6rem;
            flex-shrink: 0;
            width: 36px;
            text-align: center;
        }
        .card-body { flex: 1; min-width: 0; }
        .card-title {
            font-size: 0.9rem;
            color: #e2e8f0;
            font-weight: 600;
            margin-bottom: 2px;
            line-height: 1.3;
        }
        .card-meta {
            font-size: 0.75rem;
            color: #8892a4;
        }
        .badge {
            display: inline-block;
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: 600;
            text-transform: uppercase;
            margin-right: 4px;
        }
        .badge-base { background: #1a3a2a; color: #2ecc71; }
        .badge-cip { background: #2a1a3a; color: #bb86fc; }
        .badge-cover { background: #3a2a1a; color: #f0a050; }
        .badge-consolidated { background: #1a2a3a; color: #5dade2; }
        .tag {
            display: inline-block;
            font-size: 0.6rem;
            padding: 1px 5px;
            border-radius: 3px;
            background: #1e2a3a;
            color: #8892a4;
            margin-right: 3px;
        }
        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: #141a28;
            border: 1px solid #1e2a3a;
            color: #8892a4;
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn:hover, .filter-btn.active {
            border-color: #5dade2;
            color: #e2e8f0;
            background: #1a2a3a;
        }
        .search-box {
            background: #141a28;
            border: 1px solid #1e2a3a;
            color: #e2e8f0;
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 0.75rem;
            width: 200px;
            outline: none;
        }
        .search-box:focus { border-color: #5dade2; }
        .hidden { display: none !important; }
        @media (max-width: 700px) {
            .grid, .figures-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">&larr; Back to Home</a>
        <h1>CTMM Patent Portfolio</h1>
        <p class="subtitle">Church-Turing Meta-Machine &mdash; Patent Documents &amp; Technical Figures</p>

        <h2>Patent Documents (PDF)</h2>
        <p class="section-note">Click to view or download each patent filing.</p>
        <div class="grid" id="pdf-grid"></div>

        <h2>Technical Figures</h2>
        <p class="section-note">Interactive HTML diagrams referenced in the patent filings.</p>
        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="base">Base Patent</button>
            <button class="filter-btn" data-filter="cloomc">CLOOMC++</button>
            <button class="filter-btn" data-filter="io">I/O Addressing</button>
            <button class="filter-btn" data-filter="lambda-rec">Lambda Recursion</button>
            <button class="filter-btn" data-filter="church">Pure Church</button>
            <button class="filter-btn" data-filter="general">General</button>
            <input type="text" class="search-box" id="fig-search" placeholder="Search figures...">
        </div>
        <div class="grid figures-grid" id="figures-grid"></div>
    </div>

    <script>
        const patents = [
            { file: "patent-ctmm-consolidated-2026.pdf", title: "Consolidated Patent Portfolio", badge: "consolidated", meta: "All parts + addendums A, B, C \u2014 April 2026" },
            { file: "patent-ctmm-unified.pdf", title: "Base Patent \u2014 Unified Filing", badge: "base", meta: "Dual-Gate TSB, Golden Tokens, LAMBDA, Pure Church \u2014 Feb 2026" },
            { file: "patent-ctmm-lambda.pdf", title: "Initial Filing \u2014 LAMBDA Instruction", badge: "base", meta: "LAMBDA, NULL type, atomic abstractions \u2014 Feb 12, 2026" },
            { file: "patent-church-machine-claims.pdf", title: "CIP: Pure Church Lambda Machine", badge: "cip", meta: "Turing exclusion as security mechanism \u2014 Feb 2026" },
            { file: "patent-cloomc-universal-target.pdf", title: "CIP: CLOOMC++ Universal Target", badge: "cip", meta: "Multi-language compiler, Resident Object Model \u2014 Mar 2026" },
            { file: "patent-ctmm-io-addressing-2026.pdf", title: "CIP: Abstract GT I/O Addressing", badge: "cip", meta: "Hardware-routed I/O, Home Base Tunnel \u2014 Mar 2026" },
            { file: "patent-ctmm-lambda-recursion-2026.pdf", title: "CIP: Lambda Recursion", badge: "cip", meta: "O(1) recursion, LAMBDA CR6, English front-end \u2014 Apr 2026" },
            { file: "patent-church-machine-email.pdf", title: "Attorney Cover Email", badge: "cover", meta: "CIP filing cover letter" },
        ];

        const figures = [
            { file: "dual-gate-tsb.html", title: "Dual-Gate Trusted Security Base", cat: "base", tags: ["Fig 1", "mLoad", "mSave"] },
            { file: "gt-format-type-field.html", title: "GT Format and Type Field", cat: "base", tags: ["Fig 2", "Golden Token"] },
            { file: "b-bit-propagation.html", title: "B-bit Capability Propagation Control", cat: "base", tags: ["Fig 3", "mSave"] },
            { file: "lambda-vs-call.html", title: "LAMBDA vs. CALL Execution Paths", cat: "base", tags: ["Fig 4"] },
            { file: "machine-status-fast-path.html", title: "Machine-Status Fast Path", cat: "base", tags: ["Fig 5", "LAMBDA"] },
            { file: "stack-frames.html", title: "Self-Describing Stack Frames", cat: "base", tags: ["Fig 6"] },
            { file: "stack-frames-diagram.html", title: "Stack Frames (Detailed)", cat: "base", tags: ["Fig 6 alt"] },
            { file: "pp250-gc.html", title: "PP250 Deterministic Garbage Collection", cat: "base", tags: ["Fig 7", "G-bit"] },
            { file: "church-processor-block.html", title: "Pure Church Processor Block Diagram", cat: "base", tags: ["Fig 8"] },
            { file: "vulnerability-elimination.html", title: "Vulnerability Elimination by Construction", cat: "base", tags: ["Fig 9"] },
            { file: "atomic-abstraction-architecture.html", title: "Atomic Abstraction Architecture \u2014 7 Zeroes", cat: "base", tags: ["Fig 10"] },
            { file: "safe-turing-abstractions.html", title: "Safe Turing Abstractions", cat: "base", tags: ["Fig 11"] },
            { file: "unified-address-space.html", title: "Unified Address Space", cat: "base", tags: ["Fig 12"] },
            { file: "network-transparency-fbit.html", title: "Network Transparency via F-bit", cat: "base", tags: ["Fig 13"] },
            { file: "three-dispatch-styles.html", title: "Three Dispatch Styles", cat: "base", tags: ["Fig 14"] },
            { file: "five-phase-boot.html", title: "Five-Phase Boot Sequence", cat: "base", tags: ["Fig 15"] },
            { file: "church-numeral-dispatch.html", title: "Church Numeral Method Dispatch", cat: "base", tags: ["Fig 16"] },
            { file: "data-objects-bridge.html", title: "DATA Objects \u2014 Church/Turing Bridge", cat: "base", tags: ["Fig 17"] },
            { file: "lambda-nesting-sequence.html", title: "Non-Nestable LAMBDA with CALL Nesting", cat: "base", tags: ["Fig 5 initial"] },
            { file: "lambda-calculus-mapping.html", title: "Lambda Calculus Correspondence", cat: "base", tags: ["Fig 6 initial"] },
            { file: "lambda-clamp-example.html", title: "Constructive Example \u2014 Clamp Function", cat: "base", tags: ["Fig 7 initial"] },
            { file: "lambda-flow-diagram.html", title: "LAMBDA Flow Diagram", cat: "general", tags: ["LAMBDA"] },
            { file: "mload-validation-pipeline.html", title: "mLoad Five-Check Validation Sequence", cat: "base", tags: ["Fig 12 initial", "mLoad"] },
            { file: "mint-abstraction-nesting.html", title: "Abstraction Nesting \u2014 Mint via Thread", cat: "base", tags: ["Fig 13 initial"] },
            { file: "hello-mum-tunnel.html", title: "Hello Mum \u2014 Secure Cross-Architecture Comm", cat: "base", tags: ["Fig 14 initial", "Tunnel"] },
            { file: "boot-sequence-state-machine.html", title: "Boot Sequence State Machine", cat: "base", tags: ["Fig 11 initial"] },
            { file: "conventional-vs-ctmm.html", title: "Conventional vs. CTMM Architecture", cat: "general", tags: ["comparison"] },
            { file: "dispatch-styles-comparison.html", title: "Dispatch Styles Comparison", cat: "general", tags: ["comparison"] },
            { file: "namespace-architecture.html", title: "Namespace Architecture", cat: "general", tags: ["Navana"] },
            { file: "ns-gate-unified-architecture.html", title: "NS Gate Unified Architecture", cat: "general", tags: ["mLoad", "NS"] },
            { file: "tunnel-architecture.html", title: "Tunnel Architecture", cat: "general", tags: ["F-bit", "network"] },
            { file: "multi-language-compilation.html", title: "Multi-Language Compilation to Universal Target", cat: "cloomc", tags: ["Fig 24"] },
            { file: "single-lump-call-split.html", title: "Single-Lump CALL Split", cat: "cloomc", tags: ["Fig 25", "CR14", "CR6"] },
            { file: "compiler-security-separation.html", title: "Compiler-Security Separation", cat: "cloomc", tags: ["Fig 26"] },
            { file: "upload-driven-lifecycle.html", title: "Upload-Driven Lifecycle", cat: "cloomc", tags: ["Fig 27", "Navana"] },
            { file: "scale-free-security-model.html", title: "Scale-Free Security Model", cat: "cloomc", tags: ["Fig 28"] },
            { file: "abstract-gt-address-space.html", title: "Abstract GT Address Space", cat: "io", tags: ["Fig A1", "Abstract GT"] },
            { file: "home-base-tunnel.html", title: "Home Base Tunnel Architecture", cat: "io", tags: ["Fig A2", "0xFF000000"] },
            { file: "mtbf-qualification-tiers.html", title: "MTBF Qualification Tiers", cat: "io", tags: ["Fig A3", "MTBF"] },
            { file: "local-peripheral-autonomy.html", title: "Local Peripheral Autonomy", cat: "io", tags: ["Fig A4", "air-gapped"] },
            { file: "hp35-slideRule-opcode-distribution.html", title: "HP-35 & SlideRule Opcode Distribution", cat: "church", tags: ["Fig 20", "bar chart"] },
            { file: "ada-lovelace-programming-model.html", title: "Ada Lovelace Programming Model", cat: "church", tags: ["Fig 21", "Bernoulli"] },
            { file: "lambda-cr6-self-invocation-flow.html", title: "LAMBDA CR6 Self-Invocation Flow", cat: "lambda-rec", tags: ["Fig CR-1", "idempotent"] },
            { file: "three-loop-styles-comparison.html", title: "Three Loop Styles \u2014 LAMBDA CR6 Dominates", cat: "lambda-rec", tags: ["Fig CR-2", "O(1)"] },
            { file: "no-counter-software-drives.html", title: "Why No Counter \u2014 Software Drives", cat: "lambda-rec", tags: ["Fig CR-3"] },
        ];

        const pdfGrid = document.getElementById('pdf-grid');
        patents.forEach(p => {
            const badgeClass = 'badge-' + p.badge;
            const badgeLabel = p.badge === 'consolidated' ? 'FULL' : p.badge === 'base' ? 'BASE' : p.badge === 'cip' ? 'CIP' : 'COVER';
            pdfGrid.innerHTML += `
                <a class="card" href="/patents/files/${p.file}" target="_blank">
                    <div class="card-icon">&#128196;</div>
                    <div class="card-body">
                        <div class="card-title"><span class="badge ${badgeClass}">${badgeLabel}</span> ${p.title}</div>
                        <div class="card-meta">${p.meta}</div>
                    </div>
                </a>`;
        });

        const figGrid = document.getElementById('figures-grid');
        function renderFigures(filter, search) {
            figGrid.innerHTML = '';
            const q = (search || '').toLowerCase();
            figures.forEach(f => {
                if (filter !== 'all' && f.cat !== filter) return;
                const text = (f.title + ' ' + f.tags.join(' ')).toLowerCase();
                if (q && !text.includes(q)) return;
                const tagsHtml = f.tags.map(t => `<span class="tag">${t}</span>`).join('');
                figGrid.innerHTML += `
                    <a class="card" href="/figures/${f.file}" target="_blank" data-cat="${f.cat}">
                        <div class="card-icon">&#128202;</div>
                        <div class="card-body">
                            <div class="card-title">${f.title}</div>
                            <div class="card-meta">${tagsHtml}</div>
                        </div>
                    </a>`;
            });
            if (!figGrid.children.length) {
                figGrid.innerHTML = '<div style="color:#8892a4;padding:20px;grid-column:1/-1;text-align:center;">No figures match your filter.</div>';
            }
        }

        renderFigures('all', '');

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderFigures(btn.dataset.filter, document.getElementById('fig-search').value);
            });
        });

        document.getElementById('fig-search').addEventListener('input', e => {
            const active = document.querySelector('.filter-btn.active');
            renderFigures(active ? active.dataset.filter : 'all', e.target.value);
        });
    </script>
</body>
</html>
